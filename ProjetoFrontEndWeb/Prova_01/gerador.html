<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de data hash</title>
</head>
<body>
    <script type="module">
        import bcrypt from 'https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/+esm';

const urlPlainJson = 'https://raw.githubusercontent.com/EduardoDev0706/Repositorio_IFTM/refs/heads/main/ProjetoFrontEndWeb/Prova_01/data/users_plain.json';

async function gerarJsonCriptografado() {
    try {
        // Requisição Assíncrona
        const response = await fetch(urlPlainJson);
        const users = await response.json();

        const hashedUsers = users.map(user => {
            const salt = bcrypt.genSaltSync(10);
            const hash = bcrypt.hashSync(user.password, salt);
            return {
                username: user.username,
                password: hash
            };
        });

        console.log("Copie o JSON abaixo e salve como users_hashed.json no seu GitHub:");
        console.log(JSON.stringify(hashedUsers, null, 2));
    } catch (error) {
        console.error("Erro ao buscar ou processar o JSON:", error);
    }
}

gerarJsonCriptografado();
    </script>
</body>
</html>
